<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>لوحة الحضور — ليلك & هارون</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f2ef; --card:#faf9f7; --ink:#191919; --soft:#6f6f6f;
    --pink:#DA7665; --pink-soft:#f0e2e6; --line:#e7e2dd;
    --shadow:0 10px 30px rgba(15,15,15,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'El Messiri',sans-serif;background:var(--bg);color:var(--ink);line-height:1.8;padding:24px}
  .wrap{max-width:1080px;margin:0 auto}
  h1{font-size:1.6rem;font-weight:700}
  .muted{color:var(--soft);font-size:.95rem}

  /* شاشة الدخول */
  .login{max-width:380px;margin:12vh auto;background:var(--card);padding:34px 28px;border-radius:18px;box-shadow:var(--shadow);text-align:center}
  .login h1{margin-bottom:6px}
  .login .heart{font-size:1.6rem;color:var(--pink)}
  input[type=password]{width:100%;margin-top:18px;padding:13px 16px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:1rem;background:#fff;text-align:center}
  input[type=password]:focus{outline:none;border-color:var(--pink)}
  .btn{margin-top:14px;width:100%;padding:13px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:.25s}
  .btn:hover{background:#000}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--pink-soft)}
  .btn.pink{background:var(--pink)}
  .err{color:#c0392b;margin-top:12px;min-height:22px;font-size:.9rem}

  /* الهيدر */
  .topbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .actions .btn{width:auto;padding:9px 18px;margin:0;font-size:.9rem}

  /* كروت الملخص */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
  .stat{background:var(--card);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);border-top:3px solid var(--pink)}
  .stat .n{font-size:1.9rem;font-weight:700;line-height:1.2}
  .stat .l{color:var(--soft);font-size:.9rem}

  /* الجدول */
  .table-wrap{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:640px}
  th,td{padding:13px 16px;text-align:right;border-bottom:1px solid var(--line);font-size:.95rem;vertical-align:top}
  th{background:#f0ece7;font-weight:600;position:sticky;top:0}
  tbody tr:hover{background:#faf6f2}
  .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.82rem;font-weight:600}
  .b-yes{background:#e5f4ea;color:#1e7d47}
  .b-no{background:#fdeaea;color:#c0392b}
  .b-maybe{background:#fdf3e6;color:#b9770f}
  .msg-cell{max-width:320px;color:var(--ink)}
  .empty{text-align:center;padding:40px;color:var(--soft)}
  .hidden{display:none}
</style>
</head>
<body>

<!-- ============ شاشة الدخول ============ -->
<div id="loginView" class="login">
  <div class="heart">🔒</div>
  <h1>لوحة الحضور</h1>
  <p class="muted">اكتب باسورد الأدمن للدخول</p>
  <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" />
  <button class="btn" id="loginBtn">دخول</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- ============ اللوحة ============ -->
<div id="dashView" class="wrap hidden">
  <div class="topbar">
    <div>
      <h1>لوحة الحضور 💐</h1>
      <p class="muted">كل تأكيدات الحضور والرسائل — ليلك &amp; هارون</p>
    </div>
    <div class="actions">
      <button class="btn pink" id="refreshBtn">↻ تحديث</button>
      <button class="btn ghost" id="csvBtn">⬇️ تصدير CSV</button>
      <button class="btn ghost" id="logoutBtn">خروج</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="table-wrap">
    <table id="table">
      <thead>
        <tr>
          <th>التاريخ</th>
          <th>الاسم</th>
          <th>الحضور</th>
          <th>المرافقين</th>
          <th>الرسالة</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty hidden" id="empty">لسه مفيش أي تأكيدات حضور 🤍</div>
  </div>
</div>

<script>
  let PASSWORD = sessionStorage.getItem('rsvp_admin_pass') || '';
  let ROWS = [];

  const $ = id => document.getElementById(id);

  function attendLabel(v){
    if(v==='yes')   return '<span class="badge b-yes">نعم</span>';
    if(v==='no')    return '<span class="badge b-no">لا</span>';
    if(v==='maybe') return '<span class="badge b-maybe">ربما</span>';
    return v || '—';
  }
  function fmtDate(s){
    if(!s) return '—';
    const d = new Date(s);
    return d.toLocaleString('ar-EG',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }
  function esc(t){
    return String(t||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function loadData(){
    $('loginErr').textContent = '';
    try{
      const res = await fetch('/api/list', { headers: { 'x-admin-password': PASSWORD } });
      if(res.status === 401){
        PASSWORD = ''; sessionStorage.removeItem('rsvp_admin_pass');
        showLogin('باسورد غير صحيح');
        return;
      }
      if(!res.ok) throw new Error();
      const data = await res.json();
      ROWS = data.rows || [];
      sessionStorage.setItem('rsvp_admin_pass', PASSWORD);
      render();
      showDash();
    }catch(e){
      showLogin('حصل خطأ في التحميل، حاول تاني');
    }
  }

  function render(){
    // ملخص
    const yes   = ROWS.filter(r => r.attend==='yes');
    const no    = ROWS.filter(r => r.attend==='no').length;
    const maybe = ROWS.filter(r => r.attend==='maybe').length;
    const people = yes.reduce((s,r)=> s + 1 + (parseInt(r.guests,10)||0), 0); // الحاضر + مرافقينه
    $('stats').innerHTML = `
      <div class="stat"><div class="n">${ROWS.length}</div><div class="l">إجمالي الردود</div></div>
      <div class="stat"><div class="n">${yes.length}</div><div class="l">أكّدوا الحضور (نعم)</div></div>
      <div class="stat"><div class="n">${people}</div><div class="l">إجمالي عدد الأفراد المتوقع</div></div>
      <div class="stat"><div class="n">${maybe}</div><div class="l">ربما</div></div>
      <div class="stat"><div class="n">${no}</div><div class="l">اعتذروا (لا)</div></div>
    `;
    // الجدول
    if(ROWS.length === 0){
      $('tbody').innerHTML=''; $('empty').classList.remove('hidden'); return;
    }
    $('empty').classList.add('hidden');
    $('tbody').innerHTML = ROWS.map(r => `
      <tr>
        <td class="muted">${fmtDate(r.created_at)}</td>
        <td><strong>${esc(r.name)}</strong></td>
        <td>${attendLabel(r.attend)}</td>
        <td>${parseInt(r.guests,10)||0}</td>
        <td class="msg-cell">${esc(r.msg) || '<span class="muted">—</span>'}</td>
      </tr>
    `).join('');
  }

  function exportCSV(){
    const head = ['التاريخ','الاسم','الحضور','المرافقين','الرسالة'];
    const lines = ROWS.map(r => [
      fmtDate(r.created_at), r.name,
      ({yes:'نعم',no:'لا',maybe:'ربما'}[r.attend]||r.attend),
      (parseInt(r.guests,10)||0), (r.msg||'').replace(/\n/g,' ')
    ]);
    const csv = [head, ...lines]
      .map(row => row.map(c => `"${String(c==null?'':c).replace(/"/g,'""')}"`).join(','))
      .join('\r\n');
    const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'}); // BOM لدعم العربي في Excel
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rsvp-list.csv';
    a.click();
  }

  function showLogin(err){
    $('dashView').classList.add('hidden');
    $('loginView').classList.remove('hidden');
    $('loginErr').textContent = err || '';
    $('pass').focus();
  }
  function showDash(){
    $('loginView').classList.add('hidden');
    $('dashView').classList.remove('hidden');
  }

  // أحداث
  $('loginBtn').addEventListener('click', ()=>{ PASSWORD = $('pass').value; if(PASSWORD) loadData(); });
  $('pass').addEventListener('keydown', e=>{ if(e.key==='Enter'){ PASSWORD = $('pass').value; if(PASSWORD) loadData(); } });
  $('refreshBtn').addEventListener('click', loadData);
  $('csvBtn').addEventListener('click', exportCSV);
  $('logoutBtn').addEventListener('click', ()=>{ PASSWORD=''; sessionStorage.removeItem('rsvp_admin_pass'); showLogin(''); });

  // لو فيه باسورد محفوظ من الجلسة، جرّب تحمّل مباشرة
  if(PASSWORD){ loadData(); } else { showLogin(''); }
</script>
</body>
</html>
